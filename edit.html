{% extends "base.html" %}
{% block content %}
  <h2>Edit Task</h2>
  <form method="post" action="{{ url_for('edit', task_id=task.id) }}">
    <input type="text" name="title" value="{{ task.title }}" />
    <button class="btn-primary" type="submit">Save</button>
    <a href="{{ url_for('index') }}" class="btn-link">Cancel</a>
  </form>
{% endblock %}
